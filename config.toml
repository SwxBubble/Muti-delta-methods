task = "compression"
pipeline = false
task_data_dir = "./test_data/tar_versions/gcc"

feature_index_path = "./test_data/default.index"
dedup_index_path = "./test_data/default.dedup"
chunk_data_path = "./test_data/default.data"
chunk_meta_path = "./test_data/default.meta"
file_meta_path = "./test_data/default.file"

[feature]
type = "cdfe-setorder-v2"

min_subblock_size = 256
avg_subblock_size = 512
max_subblock_size = 1024

boundary_mask = 511

split_window_size = 32
feature_window_size = 16

local_features_per_subblock = 1

topk_candidates = 3
min_matched_subblocks = 0
min_aligned_subblocks = 0
min_jaccard_proxy = 0.15
pos_tolerance = 0.15
hot_posting_limit = 64
order_lambda = 4.0


[chunker]
# one of fast-cdc, rabin-cdc
type = "fast-cdc"
min_chunk_size = 4096
max_chunk_size = 16384
stop_mask = 8191 # 1 << 13 - 1, only for fast cdc

[storage]
encoder = "xdelta"
cache_size = 500 #mb