task = "compression"
pipeline = false
task_data_dir = "./test_data/tar_versions/gcc"

feature_index_path = "./test_data/default.index"
dedup_index_path = "./test_data/default.dedup"
chunk_data_path = "./test_data/default.data"
chunk_meta_path = "./test_data/default.meta"
file_meta_path = "./test_data/default.file"

[feature]
# one of finesse, odess, n-transform, palantir, bestfit, palantir2 ,argus,cdfe-ordered-v1
type = "cdfe-ordered-v1"
feature_count = 12
cdfe_min_subblock_size = 64
cdfe_avg_subblock_size = 128
cdfe_max_subblock_size = 512
cdfe_boundary_mask = 31
match_threshold = 2


[chunker]
# one of fast-cdc, rabin-cdc
type = "fast-cdc"
min_chunk_size = 4096
max_chunk_size = 16384
stop_mask = 8191 # 1 << 13 - 1, only for fast cdc

[storage]
encoder = "xdelta"
cache_size = 500 #mb