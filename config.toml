task = "compression"
pipeline = false
task_data_dir = "./test_data/tar_versions/gcc"

feature_index_path = "./test_data/default.index"
dedup_index_path = "./test_data/default.dedup"
chunk_data_path = "./test_data/default.data"
chunk_meta_path = "./test_data/default.meta"
file_meta_path = "./test_data/default.file"

[feature]
# one of finesse, odess, n-transform, palantir, bestfit, palantir2 ,argus
type = "cdfe-setorder-v2"

min_subblock_size = 64
max_subblock_size = 512
boundary_divisor = 16

split_window_size = 16
feature_window_size = 16
local_features_per_subblock = 2

topk_candidates = 4
min_overlap_hits = 4
pos_tolerance = 0.15
hot_posting_limit = 256
order_lambda = 2.0


[chunker]
# one of fast-cdc, rabin-cdc
type = "fast-cdc"
min_chunk_size = 4096
max_chunk_size = 16384
stop_mask = 8191 # 1 << 13 - 1, only for fast cdc

[storage]
encoder = "xdelta"
cache_size = 500 #mb